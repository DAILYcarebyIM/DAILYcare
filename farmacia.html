<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAILYcare — Consignação Farmácia Fonte da Moura</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-weight:600;font-size:15px;letter-spacing:-0.3px}.logo span{color:#8b6f4e}
.header-right{display:flex;align-items:center;gap:10px}
.sync-info{font-size:11px;color:#999}
.sync-info.ok{color:#2a7a2a}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ddd;display:inline-block;margin-right:4px;vertical-align:middle}
.sync-dot.ok{background:#4caf50}.sync-dot.err{background:#e74c3c}
.btn{padding:6px 12px;border:1px solid #ddd;border-radius:7px;cursor:pointer;font-size:11px;font-family:inherit;background:#fff;color:#1a1a1a;transition:all 0.15s;font-weight:500}
.btn:hover{background:#f5f5f0;border-color:#bbb}
.tabs{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 1.5rem;display:flex;gap:2px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:10px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-family:inherit;color:#666;border-bottom:2px solid transparent;transition:all 0.15s;font-weight:500;white-space:nowrap}
.tab:hover{color:#1a1a1a}
.tab.active{color:#8b6f4e;border-bottom-color:#8b6f4e;font-weight:600}
.main{max-width:1050px;margin:0 auto;padding:1.5rem}
.pg{display:none}.pg.active{display:block}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;margin-bottom:1rem;overflow:hidden}
.card-inner{padding:1rem 1.25rem}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.met{background:#f8f8f5;border-radius:8px;padding:0.75rem;border:1px solid #eeede8}
.met .lb{font-size:11px;color:#888;margin-bottom:3px}
.met .vl{font-size:19px;font-weight:600;letter-spacing:-0.5px}
.met .vl.amber{color:#856404}.met .vl.green{color:#1a6b1a}.met .vl.red{color:#c0392b}
h2{font-size:15px;font-weight:600;margin-bottom:12px;letter-spacing:-0.2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:11px;white-space:nowrap;background:#fafaf7}
td{padding:7px 10px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf7}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.bg-g{background:#d4edda;color:#155724}.bg-a{background:#fff3cd;color:#856404}
.bg-r{background:#f8d7da;color:#721c24}.bg-gray{background:#e9ecef;color:#495057}
.green{color:#1a6b1a}.amber{color:#856404}.red{color:#c0392b}
.tag{display:inline-block;padding:2px 7px;background:#f0f0ec;border-radius:12px;font-size:10px;color:#666;font-weight:500}
.cbanner{background:#fff8e6;border:1px solid #f5c842;border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:1rem;border:1px solid}
.al-suc{background:#d4edda;color:#155724;border-color:#c3e6cb}
.al-warn{background:#fff3cd;color:#856404;border-color:#ffc107}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#8b6f4e;padding:8px 10px;background:#fffbf5;border-bottom:1px solid #eee}
.section-label.green-label{color:#155724;background:#f0fff4;border-bottom-color:#c3e6cb}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e5e0;border-top-color:#8b6f4e;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{text-align:center;padding:4rem;color:#888;font-size:13px}
.empty{text-align:center;padding:2rem;color:#999;font-size:12px}
.hint{font-size:11px;color:#bbb;margin-top:1rem}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DAILY<span>care</span> <span style="font-weight:400;color:#aaa;font-size:12px">× Farmácia Fonte da Moura</span></div>
  <div class="header-right">
    <span class="sync-info" id="sync-info"><span class="sync-dot" id="sync-dot"></span>A carregar…</span>
    <button class="btn" onclick="loadData()">↺ Atualizar</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('pagamentos',this)">Pagamentos</button>
  <button class="tab" onclick="showTab('stock',this)">Stock em consignação</button>
  <button class="tab" onclick="showTab('encomendas',this)">A encomendar</button>
</div>

<div class="main">
  <div id="pg-pagamentos" class="pg active"><div class="loading-full"><span class="spinner"></span>A carregar…</div></div>
  <div id="pg-stock" class="pg"><div class="loading-full"><span class="spinner"></span>A carregar…</div></div>
  <div id="pg-encomendas" class="pg"><div class="loading-full"><span class="spinner"></span>A carregar…</div></div>
</div>

<script>
const SB_URL='https://zwdnnawqcbulcfveiqmx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG5uYXdxY2J1bGNmdmVpcW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTQwMTAsImV4cCI6MjA4OTE5MDAxMH0.jXeTvdQPMSeK8CZTKvp2tF93HxyXlqaGCybGZbZYnTs';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const fmt=n=>(Math.round((n||0)*100)/100).toFixed(2)+'€';
const fmtDate=d=>d?d.split('-').reverse().join('/'):'—';
let DATA=null;

function showTab(id,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function setSync(state,msg){
  const dot=document.getElementById('sync-dot');
  const info=document.getElementById('sync-info');
  dot.className='sync-dot'+(state==='ok'?' ok':state==='err'?' err':'');
  info.className='sync-info'+(state==='ok'?' ok':'');
  info.innerHTML=`<span class="sync-dot${state==='ok'?' ok':state==='err'?' err':''}"></span>${msg}`;
}

async function loadData(){
  setSync('','A carregar…');
  try{
    // pedir só colunas que sabemos que existem — as novas são opcionais
    const r=await fetch(`${SB_URL}/rest/v1/consignacao_publica?select=*&limit=1`,{headers:HDR});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const rows=await r.json();
    if(!rows.length){
      setSync('err','Sem dados — aguarda sincronização do DAILYcare');
      showSemDados();
      return;
    }
    DATA=rows[0];
    const upd=DATA.updated_at?new Date(DATA.updated_at).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    setSync('ok','Atualizado '+upd);
    renderPagamentos();
    renderStock();
    renderEncomendas();
  }catch(e){
    setSync('err','Erro: '+e.message);
    ['pagamentos','stock','encomendas'].forEach(t=>{
      document.getElementById('pg-'+t).innerHTML=`<div class="alert al-warn">⚠ Não foi possível carregar: ${e.message}</div>`;
    });
  }
}

function showSemDados(){
  ['pagamentos','stock','encomendas'].forEach(t=>{
    document.getElementById('pg-'+t).innerHTML=`<div class="alert al-warn">⏳ Sem dados ainda. O DAILYcare ainda não sincronizou com a farmácia.</div>`;
  });
}

// ── PAGAMENTOS ───────────────────────────────────────────────────────────────
function renderPagamentos(){
  const vendas=DATA.data||[];
  const pendentes=vendas.filter(v=>v.estado!=='Pago');
  const pagos=vendas.filter(v=>v.estado==='Pago');
  const tPagar=pendentes.reduce((s,v)=>s+(v.custo_efetivo||0)*(v.qty||1),0);
  const tPVP=vendas.filter(v=>v.pvp>0).reduce((s,v)=>s+(v.pvp||0)*(v.qty||1),0);
  const tJaPago=pagos.reduce((s,v)=>s+(v.custo_efetivo||0)*(v.qty||1),0);
  const tUn=pendentes.reduce((s,v)=>s+(v.qty||1),0);

  const rowHtml=(v,isPago)=>{
    const custoEf=(v.custo_efetivo||0)*(v.qty||1);
    const pvpCob=v.pvp_cobrado||v.pvp||0;
    const descForn=v.desc_forn||0;
    const descCli=v.desc_cliente||0;
    return `<tr style="${isPago?'opacity:0.45':''}">
      <td style="white-space:nowrap;color:#888;font-size:11px">${fmtDate(v.data)}</td>
      <td>
        <div style="font-weight:600">${v.produto||'—'}</div>
        ${v.cnp?`<div style="font-size:10px;color:#8b6f4e;font-family:monospace">CNP: ${v.cnp}</div>`:''}
      </td>
      <td style="text-align:center">${v.qty||1}</td>
      <td>
        <div style="font-weight:600">${fmt(v.pvp||0)}</div>
        ${descCli>0?`<div style="font-size:10px;color:#856404">cliente: ${fmt(pvpCob)} (-${descCli}%)</div>`:''}
      </td>
      <td>${descForn>0?`<span class="badge bg-g" title="10% habitual + ${descForn}% extra = ${10+descForn}% total">10%+${descForn}%</span>`:'<span style="color:#bbb;font-size:11px">10%</span>'}</td>
      <td class="amber"><strong>${fmt(custoEf)}</strong></td>
      <td><span class="badge ${isPago?'bg-g':'bg-a'}">${isPago?'✓ Pago':'Por pagar'}</span></td>
    </tr>`;
  };

  document.getElementById('pg-pagamentos').innerHTML=`
    <h2>Pagamentos de consignação</h2>
    ${tPagar>0?`
    <div class="cbanner">
      <div>
        <div style="font-weight:600;color:#856404">Total a liquidar à DAILYcare</div>
        <div style="font-size:11px;color:#999">${pendentes.length} linha${pendentes.length!==1?'s':''} · ${tUn} unidade${tUn!==1?'s':''}</div>
      </div>
      <div style="font-size:26px;font-weight:700;color:#856404">${fmt(tPagar)}</div>
    </div>`:`<div class="alert al-suc">✓ Tudo liquidado. Sem pagamentos pendentes.</div>`}
    <div class="metrics">
      <div class="met"><div class="lb">A pagar (pendente)</div><div class="vl amber">${fmt(tPagar)}</div></div>
      <div class="met"><div class="lb">Já liquidado</div><div class="vl green">${fmt(tJaPago)}</div></div>
      <div class="met"><div class="lb">Total PVP vendido</div><div class="vl">${fmt(tPVP)}</div></div>
      <div class="met"><div class="lb">Unidades pendentes</div><div class="vl">${tUn}</div></div>
    </div>
    ${pendentes.length?`
    <div class="card">
      <div class="section-label">Por liquidar — ${fmt(tPagar)}</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Data</th><th>Produto</th><th style="text-align:center">Qty</th><th>PVP unit.</th><th>Desc. forn.</th><th>A pagar</th><th>Estado</th></tr></thead>
        <tbody>
          ${pendentes.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(v=>rowHtml(v,false)).join('')}
          <tr style="background:#fffbf5;font-weight:600">
            <td colspan="5" style="text-align:right;color:#888;font-size:12px">Total:</td>
            <td class="amber" style="font-size:14px">${fmt(tPagar)}</td><td></td>
          </tr>
        </tbody>
      </table></div>
    </div>`:''}
    ${pagos.length?`
    <div class="card">
      <div class="section-label">Histórico liquidado — ${fmt(tJaPago)}</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Data</th><th>Produto</th><th style="text-align:center">Qty</th><th>PVP unit.</th><th>Desc. forn.</th><th>Pago</th><th>Estado</th></tr></thead>
        <tbody>${pagos.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(v=>rowHtml(v,true)).join('')}</tbody>
      </table></div>
    </div>`:''}
    ${!vendas.length?'<div class="empty">Sem vendas de consignação registadas.</div>':''}
    <div class="hint">Desc. forn. = desconto de campanha adicional ao desconto habitual de 10%.</div>`;
}

// ── STOCK ─────────────────────────────────────────────────────────────────────
function renderStock(){
  // usar stock_consignacao se existir, senão derivar dos produtos nas vendas
  const prods=DATA.stock_consignacao||[];

  if(!prods.length){
    document.getElementById('pg-stock').innerHTML=`
      <h2>Stock em consignação</h2>
      <div class="alert al-warn">⏳ Dados de stock ainda não sincronizados. Abre o DAILYcare → Consignação → ☁ Sincronizar com farmácia.</div>`;
    return;
  }

  const tStock=prods.reduce((s,p)=>s+(p.stock||0),0);
  const tValor=prods.reduce((s,p)=>s+(p.pvp||0)*(p.stock||0),0);
  const nZero=prods.filter(p=>(p.stock||0)<=0).length;
  const nBaixo=prods.filter(p=>(p.stock||0)>0&&(p.stockMin||0)>0&&(p.stock||0)<=(p.stockMin||0)).length;
  const nOk=prods.filter(p=>(p.stock||0)>(p.stockMin||0)).length;

  document.getElementById('pg-stock').innerHTML=`
    <h2>Stock em consignação</h2>
    <p style="color:#888;font-size:12px;margin-bottom:1rem">Todos os produtos em consignação na DAILYcare.</p>
    <div class="metrics">
      <div class="met"><div class="lb">Total produtos</div><div class="vl">${prods.length}</div></div>
      <div class="met"><div class="lb">Unidades em stock</div><div class="vl">${tStock}</div></div>
      <div class="met"><div class="lb">Valor PVP em stock</div><div class="vl">${fmt(tValor)}</div></div>
      <div class="met"><div class="lb">Stock OK</div><div class="vl green">${nOk}</div></div>
      <div class="met"><div class="lb">Stock baixo</div><div class="vl amber">${nBaixo}</div></div>
      <div class="met"><div class="lb">Esgotados</div><div class="vl red">${nZero}</div></div>
    </div>
    <div class="card">
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Produto</th><th>CNP</th><th>Marca</th><th>PVP (€)</th><th>Custo farm.</th><th>Stock</th><th>Mín.</th><th>Estado</th></tr></thead>
        <tbody>${prods.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(p=>{
          const st=p.stock||0, mn=p.stockMin||0;
          const badge=st<=0?'bg-r':mn>0&&st<=mn?'bg-a':'bg-g';
          const label=st<=0?'Esgotado':mn>0&&st<=mn?'Stock baixo':'OK';
          return `<tr>
            <td><strong>${p.nome}</strong></td>
            <td style="font-family:monospace;font-size:11px;color:#8b6f4e">${p.cnp||'—'}</td>
            <td><span class="tag">${p.marca||'—'}</span></td>
            <td>${fmt(p.pvp||0)}</td>
            <td class="amber">${fmt(p.custo||0)}</td>
            <td><span class="badge ${badge}">${st}</span></td>
            <td style="color:#888">${mn}</td>
            <td><span class="badge ${badge}">${label}</span></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
}

// ── ENCOMENDAS ────────────────────────────────────────────────────────────────
function renderEncomendas(){
  const aEnc=DATA.a_encomendar||[];
  const jaEnc=DATA.ja_encomendado||[];

  if(!aEnc.length&&!jaEnc.length&&!DATA.stock_consignacao){
    document.getElementById('pg-encomendas').innerHTML=`
      <h2>Produtos a encomendar</h2>
      <div class="alert al-warn">⏳ Dados ainda não sincronizados. Abre o DAILYcare → Consignação → ☁ Sincronizar com farmácia.</div>`;
    return;
  }

  document.getElementById('pg-encomendas').innerHTML=`
    <h2>Produtos a encomendar</h2>
    <p style="color:#888;font-size:12px;margin-bottom:1rem">Produtos de consignação com stock abaixo do mínimo.</p>
    ${!aEnc.length&&!jaEnc.length?'<div class="alert al-suc">✓ Todos os produtos têm stock suficiente.</div>':''}
    ${aEnc.length?`
    <div class="card">
      <div class="section-label">⚠ Por encomendar — ${aEnc.length} produto${aEnc.length!==1?'s':''}</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Produto</th><th>CNP</th><th>Stock atual</th><th>Stock mín.</th><th>Qty a repor</th><th>PVP ref.</th></tr></thead>
        <tbody>${aEnc.map(p=>`<tr>
          <td><strong>${p.nome}</strong></td>
          <td style="font-family:monospace;font-size:11px;color:#8b6f4e">${p.cnp||'—'}</td>
          <td><span class="badge ${(p.stock||0)<=0?'bg-r':'bg-a'}">${p.stock||0}</span></td>
          <td style="color:#888">${p.stockMin||0}</td>
          <td><strong class="green">${p.qtyNecessaria||0}</strong></td>
          <td style="color:#888">${fmt(p.pvp||0)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}
    ${jaEnc.length?`
    <div class="card">
      <div class="section-label green-label">✓ Já encomendado — aguarda entrega</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Produto</th><th>CNP</th><th>Stock atual</th><th>Stock mín.</th><th>Qty encomendada</th><th>PVP ref.</th></tr></thead>
        <tbody>${jaEnc.map(p=>`<tr style="opacity:0.65">
          <td><strong>${p.nome}</strong></td>
          <td style="font-family:monospace;font-size:11px;color:#8b6f4e">${p.cnp||'—'}</td>
          <td><span class="badge ${(p.stock||0)<=0?'bg-r':'bg-a'}">${p.stock||0}</span></td>
          <td style="color:#888">${p.stockMin||0}</td>
          <td><strong class="green">${p.qtyNecessaria||0}</strong></td>
          <td style="color:#888">${fmt(p.pvp||0)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}`;
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
</html>
