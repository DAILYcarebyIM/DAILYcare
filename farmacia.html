<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAILYcare — Consignação Farmácia Fonte da Moura</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{font-weight:600;font-size:15px;letter-spacing:-0.3px}.logo span{color:#8b6f4e}
.header-right{display:flex;align-items:center;gap:10px}
.sync-wrap{font-size:11px;color:#999;display:flex;align-items:center;gap:5px}
.sync-wrap.ok{color:#2a7a2a}
.dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0}
.dot.ok{background:#4caf50}.dot.err{background:#e74c3c}
.btn{padding:6px 12px;border:1px solid #ddd;border-radius:7px;cursor:pointer;font-size:11px;font-family:inherit;background:#fff;color:#1a1a1a;transition:all 0.15s;font-weight:500}
.btn:hover{background:#f5f5f0}
.tabs{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 1.5rem;display:flex;gap:2px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:10px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-family:inherit;color:#666;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap}
.tab.active{color:#8b6f4e;border-bottom-color:#8b6f4e;font-weight:600}
.main{max-width:1050px;margin:0 auto;padding:1.5rem}
.pg{display:none}.pg.active{display:block}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;margin-bottom:1rem;overflow:hidden}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.met{background:#f8f8f5;border-radius:8px;padding:.75rem;border:1px solid #eeede8}
.met .lb{font-size:11px;color:#888;margin-bottom:3px}
.met .vl{font-size:19px;font-weight:600;letter-spacing:-.5px}
.met .vl.am{color:#856404}.met .vl.gr{color:#1a6b1a}.met .vl.re{color:#c0392b}
h2{font-size:15px;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:11px;white-space:nowrap;background:#fafaf7}
td{padding:7px 10px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf7}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.g{background:#d4edda;color:#155724}.a{background:#fff3cd;color:#856404}
.r{background:#f8d7da;color:#721c24}.gray{background:#e9ecef;color:#495057}
.tag{display:inline-block;padding:2px 7px;background:#f0f0ec;border-radius:12px;font-size:10px;color:#666;font-weight:500}
.cbanner{background:#fff8e6;border:1px solid #f5c842;border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.al{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:1rem;border:1px solid}
.al.ok{background:#d4edda;color:#155724;border-color:#c3e6cb}
.al.warn{background:#fff3cd;color:#856404;border-color:#ffc107}
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8b6f4e;padding:8px 10px;background:#fffbf5;border-bottom:1px solid #eee}
.slabel.gr{color:#155724;background:#f0fff4;border-bottom-color:#c3e6cb}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #e5e5e0;border-top-color:#8b6f4e;border-radius:50%;animation:s .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes s{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:#999;font-size:12px}
.hint{font-size:11px;color:#bbb;margin-top:1rem}
</style>
</head>
<body>
<div class="header">
  <div class="logo">DAILY<span>care</span> <span style="font-weight:400;color:#aaa;font-size:12px">× Farmácia Fonte da Moura</span></div>
  <div class="header-right">
    <div class="sync-wrap" id="sw"><div class="dot" id="sd"></div><span id="st">A carregar…</span></div>
    <button class="btn" onclick="load()">↺ Atualizar</button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="tab('p',this)">Pagamentos</button>
  <button class="tab" onclick="tab('s',this)">Stock</button>
  <button class="tab" onclick="tab('e',this)">A encomendar</button>
</div>
<div class="main">
  <div id="pp" class="pg active"><div style="text-align:center;padding:4rem;color:#888"><span class="spin"></span>A carregar…</div></div>
  <div id="ps" class="pg"></div>
  <div id="pe" class="pg"></div>
</div>
<script>
const URL_SB='https://zwdnnawqcbulcfveiqmx.supabase.co/rest/v1/consignacao_publica?id=eq.1&select=data,updated_at';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG5uYXdxY2J1bGNmdmVpcW14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTQwMTAsImV4cCI6MjA4OTE5MDAxMH0.jXeTvdQPMSeK8CZTKvp2tF93HxyXlqaGCybGZbZYnTs';
const f=n=>(Math.round((n||0)*100)/100).toFixed(2)+'€';
const fd=d=>d?d.split('-').reverse().join('/'):'—';
let D=null;

function tab(id,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('p'+id).classList.add('active');
  if(btn)btn.classList.add('active');
}

function status(st,msg){
  document.getElementById('sd').className='dot'+(st==='ok'?' ok':st==='err'?' err':'');
  const sw=document.getElementById('sw');
  sw.className='sync-wrap'+(st==='ok'?' ok':'');
  document.getElementById('st').textContent=msg;
}

async function load(){
  status('','A carregar…');
  document.getElementById('pp').innerHTML='<div style="text-align:center;padding:4rem;color:#888"><span class="spin"></span>A carregar…</div>';
  try{
    const r=await fetch(URL_SB,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
    if(!r.ok) throw new Error('Erro HTTP '+r.status);
    const rows=await r.json();
    if(!rows||!rows.length||!rows[0].data){
      status('err','Sem dados');
      document.getElementById('pp').innerHTML='<div class="al warn">⏳ Sem dados ainda. Abre o DAILYcare → Consignação → ☁ Sincronizar com farmácia.</div>';
      document.getElementById('ps').innerHTML='';
      document.getElementById('pe').innerHTML='';
      return;
    }
    D=rows[0].data;
    // compatibilidade: D pode ser array (formato antigo) ou objeto {vendas,stock,...} (formato novo)
    if(Array.isArray(D)) D={vendas:D, stock:[], aEncomendar:[], jaEncomendados:[]};
    const upd=rows[0].updated_at?new Date(rows[0].updated_at).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
    status('ok','Atualizado '+upd);
    renderP(); renderS(); renderE();
  }catch(e){
    status('err','Erro: '+e.message);
    document.getElementById('pp').innerHTML='<div class="al warn">⚠ Não foi possível carregar: '+e.message+'</div>';
  }
}

function renderP(){
  const vendas=D.vendas||[];
  const pend=vendas.filter(v=>v.estado!=='Pago');
  const pagos=vendas.filter(v=>v.estado==='Pago');
  const tP=pend.reduce((s,v)=>s+(v.custo_efetivo||0)*(v.qty||1),0);
  const tPVP=vendas.reduce((s,v)=>s+(v.pvp||0)*(v.qty||1),0);
  const tPg=pagos.reduce((s,v)=>s+(v.custo_efetivo||0)*(v.qty||1),0);
  const tUn=pend.reduce((s,v)=>s+(v.qty||1),0);

  const row=(v,isPago)=>{
    const ce=(v.custo_efetivo||0)*(v.qty||1);
    const pvc=v.pvp_cobrado||v.pvp||0;
    const df=v.desc_forn||0, dc=v.desc_cliente||0;
    return `<tr style="${isPago?'opacity:.45':''}">
      <td style="white-space:nowrap;color:#888;font-size:11px">${fd(v.data)}</td>
      <td><div style="font-weight:600">${v.produto||'—'}</div>${v.cnp?`<div style="font-size:10px;color:#8b6f4e;font-family:monospace">CNP: ${v.cnp}</div>`:''}</td>
      <td style="text-align:center">${v.qty||1}</td>
      <td><div style="font-weight:600">${f(v.pvp||0)}</div>${dc>0?`<div style="font-size:10px;color:#856404">c/ desc. cliente: ${f(pvc)} (-${dc}%)</div>`:''}</td>
      <td>${df>0?`<span class="badge g" title="10% habitual + ${df}% extra = ${10+df}% total">10%+${df}%</span>`:'<span style="color:#bbb;font-size:11px">10%</span>'}</td>
      <td class="${isPago?'':'am'}"><strong>${f(ce)}</strong></td>
      <td><span class="badge ${isPago?'g':'a'}">${isPago?'✓ Pago':'Por pagar'}</span></td>
    </tr>`;
  };

  document.getElementById('pp').innerHTML=`
    <h2>Pagamentos de consignação</h2>
    ${tP>0?`<div class="cbanner"><div><div style="font-weight:600;color:#856404">Total a liquidar à DAILYcare</div><div style="font-size:11px;color:#999">${pend.length} linha${pend.length!==1?'s':''} · ${tUn} unid.</div></div><div style="font-size:26px;font-weight:700;color:#856404">${f(tP)}</div></div>`:`<div class="al ok">✓ Tudo liquidado. Sem pagamentos pendentes.</div>`}
    <div class="metrics">
      <div class="met"><div class="lb">A pagar (pendente)</div><div class="vl am">${f(tP)}</div></div>
      <div class="met"><div class="lb">Já liquidado</div><div class="vl gr">${f(tPg)}</div></div>
      <div class="met"><div class="lb">Total PVP vendido</div><div class="vl">${f(tPVP)}</div></div>
      <div class="met"><div class="lb">Unidades pendentes</div><div class="vl">${tUn}</div></div>
    </div>
    ${pend.length?`<div class="card"><div class="slabel">Por liquidar — ${f(tP)}</div><div style="overflow-x:auto"><table>
      <thead><tr><th>Data</th><th>Produto</th><th>Qty</th><th>PVP unit.</th><th>Desc. forn.</th><th>A pagar</th><th>Estado</th></tr></thead>
      <tbody>${pend.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(v=>row(v,false)).join('')}
      <tr style="background:#fffbf5;font-weight:600"><td colspan="5" style="text-align:right;color:#888;font-size:12px">Total:</td><td class="am" style="font-size:14px">${f(tP)}</td><td></td></tr>
      </tbody></table></div></div>`:''}
    ${pagos.length?`<div class="card"><div class="slabel">Histórico liquidado — ${f(tPg)}</div><div style="overflow-x:auto"><table>
      <thead><tr><th>Data</th><th>Produto</th><th>Qty</th><th>PVP unit.</th><th>Desc. forn.</th><th>Pago</th><th>Estado</th></tr></thead>
      <tbody>${pagos.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(v=>row(v,true)).join('')}</tbody></table></div></div>`:''}
    ${!vendas.length?'<div class="empty">Sem vendas de consignação registadas.</div>':''}
    <div class="hint">Desc. forn. = desconto de campanha adicional ao desconto habitual de 10%.</div>`;
}

function renderS(){
  const prods=D.stock||[];
  if(!prods.length){
    document.getElementById('ps').innerHTML='<h2>Stock em consignação</h2><div class="al warn">⏳ Dados de stock ainda não sincronizados. Abre o DAILYcare → Consignação → ☁ Sincronizar com farmácia.</div>';
    return;
  }
  const tSt=prods.reduce((s,p)=>s+(p.stock||0),0);
  const tVal=prods.reduce((s,p)=>s+(p.pvp||0)*(p.stock||0),0);
  const nZ=prods.filter(p=>(p.stock||0)<=0).length;
  const nB=prods.filter(p=>(p.stock||0)>0&&(p.stockMin||0)>0&&(p.stock||0)<=(p.stockMin||0)).length;
  const nOk=prods.filter(p=>(p.stock||0)>(p.stockMin||0)||(p.stockMin||0)===0).length;
  document.getElementById('ps').innerHTML=`
    <h2>Stock em consignação</h2>
    <p style="color:#888;font-size:12px;margin-bottom:1rem">Todos os produtos em consignação na DAILYcare.</p>
    <div class="metrics">
      <div class="met"><div class="lb">Total produtos</div><div class="vl">${prods.length}</div></div>
      <div class="met"><div class="lb">Unidades em stock</div><div class="vl">${tSt}</div></div>
      <div class="met"><div class="lb">Valor PVP em stock</div><div class="vl">${f(tVal)}</div></div>
      <div class="met"><div class="lb">Stock OK</div><div class="vl gr">${nOk}</div></div>
      <div class="met"><div class="lb">Stock baixo</div><div class="vl am">${nB}</div></div>
      <div class="met"><div class="lb">Esgotados</div><div class="vl re">${nZ}</div></div>
    </div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Produto</th><th>CNP</th><th>Marca</th><th>PVP (€)</th><th>Custo farm.</th><th>Stock</th><th>Mín.</th><th>Estado</th></tr></thead>
      <tbody>${prods.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(p=>{
        const st=p.stock||0,mn=p.stockMin||0;
        const bc=st<=0?'r':mn>0&&st<=mn?'a':'g';
        const lb=st<=0?'Esgotado':mn>0&&st<=mn?'Stock baixo':'OK';
        return `<tr><td><strong>${p.nome}</strong></td><td style="font-family:monospace;font-size:11px;color:#8b6f4e">${p.cnp||'—'}</td><td><span class="tag">${p.marca||'—'}</span></td><td>${f(p.pvp||0)}</td><td style="color:#856404">${f(p.custo||0)}</td><td><span class="badge ${bc}">${st}</span></td><td style="color:#888">${mn}</td><td><span class="badge ${bc}">${lb}</span></td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

function renderE(){
  const aE=D.aEncomendar||[];
  const jE=D.jaEncomendados||[];
  if(!aE.length&&!jE.length&&!(D.stock||[]).length){
    document.getElementById('pe').innerHTML='<h2>A encomendar</h2><div class="al warn">⏳ Dados ainda não sincronizados. Abre o DAILYcare → Consignação → ☁ Sincronizar com farmácia.</div>';
    return;
  }
  document.getElementById('pe').innerHTML=`
    <h2>Produtos a encomendar</h2>
    <p style="color:#888;font-size:12px;margin-bottom:1rem">Produtos de consignação com stock abaixo do mínimo.</p>
    ${!aE.length&&!jE.length?'<div class="al ok">✓ Todos os produtos têm stock suficiente.</div>':''}
    ${aE.length?`<div class="card"><div class="slabel">⚠ Por encomendar — ${aE.length} produto${aE.length!==1?'s':''}</div><div style="overflow-x:auto"><table>
      <thead><tr><th>Produto</th><th>CNP</th><th>Stock atual</th><th>Stock mín.</th><th>Qty a repor</th><th>PVP ref.</th></tr></thead>
      <tbody>${aE.map(p=>`<tr><td><strong>${p.nome}</strong></td><td style="font-family:monospace;font-size:11px;color:#8b6f4e">${p.cnp||'—'}</td><td><span class="badge ${(p.stock||0)<=0?'r':'a'}">${p.stock||0}</span></td><td style="color:#888">${p.stockMin||0}</td><td><strong style="color:#1a6b1a">${p.qty||0}</strong></td><td style="color:#888">${f(p.pvp||0)}</td></tr>`).join('')}</tbody>
    </table></div></div>`:''}
    ${jE.length?`<div class="card"><div class="slabel gr">✓ Já encomendado — aguarda entrega</div><div style="overflow-x:auto"><table>
      <thead><tr><th>Produto</th><th>CNP</th><th>Stock atual</th><th>Stock mín.</th><th>Qty encomendada</th><th>PVP ref.</th></tr></thead>
      <tbody>${jE.map(p=>`<tr style="opacity:.65"><td><strong>${p.nome}</strong></td><td style="font-family:monospace;font-size:11px;color:#8b6f4e">${p.cnp||'—'}</td><td><span class="badge ${(p.stock||0)<=0?'r':'a'}">${p.stock||0}</span></td><td style="color:#888">${p.stockMin||0}</td><td><strong style="color:#1a6b1a">${p.qty||0}</strong></td><td style="color:#888">${f(p.pvp||0)}</td></tr>`).join('')}</tbody>
    </table></div></div>`:''}`;
}

load();
setInterval(load,5*60*1000);
</script>
</body>
</html>
